<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Me | [Your Name]</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>[Your Name]</h1>
        <p>Makeup Artist & Stylist</p>
        <nav>
            <a href="index.html">Home</a>
            <a href="portfolio.html">Portfolio</a>
            <a href="contact.html">Book Me</a>
        </nav>
    </header>

    <main>
        <section id="contact">
            <h2 class="section-title">Get In Touch</h2>
            <form class="contact-form" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Event Date, Location, & Vision</label>
                    <textarea id="message" name="message" rows="5" required placeholder="Tell me a bit about your event..."></textarea>
                </div>
                <button type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 [Your Name] Makeup Artistry. All Rights Reserved.</p>
    </footer>

</body>
</html>
